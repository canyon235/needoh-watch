services:
  - type: web
    name: needoh-watch
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: python app.py --port $PORT --auto-check
    envVars:
      - key: EMAIL_ENABLED
        value: "false"
      - key: WHATSAPP_ENABLED
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"
