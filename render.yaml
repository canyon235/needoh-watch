# Render.com deployment config
# Push to GitHub, then connect the repo on render.com
services:
  - type: web
      name: needoh-watch
          runtime: python
              buildCommand: pip install -r requirements.txt && python -m playwright install chromium && python -m playwright install-deps
                  startCommand: python app.py --port $PORT --auto-check
                      envVars:
                            - key: EMAIL_ENABLED
                                    value: "false"
                                          - key: WHATSAPP_ENABLED
                                                  value: "false"
